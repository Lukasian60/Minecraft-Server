<!DOCTYPE html>
<html>
    <head>
        <title>Ranglisten</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-0.9" >
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/jpeg" href="favicon.jpg" >
    </head>
    <body>

        <header>
            <h1>Ranglisten</h1>
        </header>

        <hr>

        <nav>
            <button class="button"><a href="index.html"><p class="buttonfont">Startseite</p></a></button>
        </nav>
        
        <hr>

        <main>
          
          <h2>
            Spielzeit
          </h2>

      <div class="tbl-wrap">
        <table>
        <thead>
          <tr>
            <th class="rank">#</th>
            <th>Name</th>
            <th>Tag</th>
            <th style="text-align:right">Spielzeit</th>
            <th class="bar-cell"></th>
            </tr>
            </thead>
            <tbody id="playtime-tbody"></tbody>
            </table>
        </div>

<script>
  const data = [
    { name: "Fabi",     tag: "FaBiUs555",          mins: 47*60+43 },
    { name: "Tobi",     tag: "ToibiusGHG",         mins: 36*60+12 },
    { name: "Dorian",   tag: "cxkdorian9",         mins: 33*60+51 },
    { name: "Tim",      tag: "Tim184GHG",          mins: 28*60+57 },
    { name: "Lukas",    tag: "Lukasian06",         mins: 27*60+45 },
    { name: "Fränzl",   tag: "Maxi2503",           mins: 27*60+16 },
    { name: "Luis",     tag: "Luistod",            mins: 26*60+51 },
    { name: "Yosef",    tag: "R3ealm",             mins: 24*60+51 },
    { name: "Isak",     tag: "Dab3di",             mins: 24*60+45 },
    { name: "Simon",    tag: "Seikower",           mins: 23*60+4  },
    { name: "Lilly",    tag: "Legoten",            mins: 21*60+36 },
    { name: "Elias",    tag: "Eleasyy",            mins: 18*60+40 },
    { name: "Alex",     tag: "TiredArrow65776",    mins: 11*60+33 },
    { name: "Isabella", tag: "ISABELLAIA",         mins: 11*60+32 },
    { name: "Jan",      tag: "ASV13Jan",           mins: 6*60+50  },
    { name: "Nati",     tag: "itan5968",           mins: 2*60+29  },
    { name: "Vivi",     tag: "Viv_2409",           mins: 17       },
    { name: "David",    tag: "Streifenh0rnchen",   mins: 0        },
    { name: "Helene",   tag: "helene138797",       mins: 0        },
  ];

  const max = data[0].mins;

  const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';

  const fmtTime = m => {
    if (m === 0) return '—';
    if (m < 60) return m + 'min';
    return Math.floor(m / 60) + 'h ' + (m % 60) + 'min';
  };

  const tbody = document.getElementById('playtime-tbody');
  data.forEach((p, i) => {
    const pct = max > 0 ? Math.round((p.mins / max) * 100) : 0;
    const rc = rankClass(i);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank ${rc}">${i + 1}</td>
      <td class="name">${p.name}</td>
      <td class="tag">${p.tag}</td>
      <td class="time ${p.mins === 0 ? 'zero' : ''}">${fmtTime(p.mins)}</td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div></td>
    `;
    tbody.appendChild(tr);
  });
</script>
          <h4>- Die Rangliste ist stand 29.6.2026 17:20</h4>

        </main>
    </body>
        <footer>
        <hr>
        </footer>
</html>
